name: Deploy Outlook Add-in to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'outlook-addin/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: outlook-addin/package-lock.json

      - name: Install dependencies
        working-directory: outlook-addin
        run: npm ci

      - name: Build
        working-directory: outlook-addin
        run: npm run build

      - name: Copy manifest and assets to dist
        working-directory: outlook-addin
        run: |
          cp manifest.xml dist/
          cp manifest.json dist/
          cp -r assets dist/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: outlook-addin/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
